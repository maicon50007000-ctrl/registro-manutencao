<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sistema de Manutenção</title>
    <style>
        /* Inherited original CSS */
        body { margin:0; font-family:Arial; background:#0f172a; color:white; display:none; } /* Hidden until auth */
        .container { display:flex; height:100vh; }
        .left { width:35%; padding:20px; background:#1e293b; }
        .right { flex:1; padding:20px; overflow:auto; }
        input, textarea, select { width:100%; margin:5px 0 10px; padding:8px; border-radius:5px; border:none; box-sizing: border-box; }
        button { padding:10px; background:#06b6d4; border:none; color:white; cursor:pointer; border-radius:5px; margin-bottom: 5px; width: 100%; }
        .card { background:#0f172a; padding:10px; margin-bottom:10px; border-radius:8px; cursor:pointer; display:flex; justify-content:space-between; border: 1px solid #334155; }
        .urgencia-Alta { color:#ef4444; } .urgencia-Média { color:#facc15; } .urgencia-Baixa { color:#22c55e; }
        .restaurado { color:#3b82f6; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
        .modal-content { background:#1e293b; padding:20px; border-radius:10px; width:300px; }
        .btn-danger { background: #ef4444; }
    </style>
</head>
<body id="adminBody">
    <div class="container">
        <div class="left">
            <h2>Gerenciar Sistema</h2>
            <input id="componente" placeholder="Componente">
            <select id="bancada"><option>B01</option><option>B02</option><option>B03</option><option>B04</option><option>B05</option></select>
            <select id="restaurado"><option value="nao">Pendente</option><option value="sim">✔ Restaurado</option></select>
            <input type="date" id="data">
            <textarea id="problema" placeholder="Problema"></textarea>
            <select id="urgencia"><option value="Baixa">Baixa</option><option value="Média">Média</option><option value="Alta">Alta</option></select>
            <button onclick="salvar()">Salvar Registro</button>
            <button style="background:#475569" onclick="location.href='index.html'">Voltar ao Painel</button>
        </div>
        <div class="right" id="lista"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="mComp"></h3>
            <p id="mDados"></p>
            <button onclick="editar()">Editar Registro</button>
            <button class="btn-danger" onclick="excluir()">Excluir</button>
            <button onclick="fechar()">Fechar</button>
        </div>
    </div>

    <script>
        // Password Protection
        const PASS = "1234";
        if (sessionStorage.getItem('auth') !== 'true') {
            let attempt = prompt("Senha de Administrador:");
            if (attempt === PASS) {
                sessionStorage.setItem('auth', 'true');
                document.getElementById('adminBody').style.display = 'block';
            } else {
                alert("Senha incorreta.");
                location.href = 'index.html';
            }
        } else {
            document.getElementById('adminBody').style.display = 'block';
        }

        let dados = JSON.parse(localStorage.getItem('dados')) || [];
        let atual = null;
        let editando = false;

        function salvar() {
            const item = {
                componente: document.getElementById('componente').value,
                bancada: document.getElementById('bancada').value,
                restaurado: document.getElementById('restaurado').value,
                data: document.getElementById('data').value,
                problema: document.getElementById('problema').value,
                urgencia: document.getElementById('urgencia').value
            };

            if (editando) {
                dados[atual] = item;
                editando = false;
            } else {
                dados.push(item);
            }

            localStorage.setItem('dados', JSON.stringify(dados));
            limparCampos();
            render();
        }

        function render() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            dados.forEach((d, i) => {
                const div = document.createElement('div');
                let classe = 'card urgencia-' + d.urgencia;
                if (d.restaurado === 'sim') classe = 'card restaurado';
                div.className = classe;
                div.innerHTML = `${d.componente} <span>${d.restaurado === 'sim' ? '✔' : d.urgencia}</span>`;
                div.onclick = () => abrir(i);
                lista.appendChild(div);
            });
        }

        function abrir(i) {
            atual = i;
            const d = dados[i];
            document.getElementById('mComp').innerText = d.componente;
            document.getElementById('mDados').innerText = `Bancada: ${d.bancada}\nData: ${d.data}\nUrgência: ${d.urgencia}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function editar() {
            const d = dados[atual];
            document.getElementById('componente').value = d.componente;
            document.getElementById('bancada').value = d.bancada;
            document.getElementById('restaurado').value = d.restaurado;
            document.getElementById('data').value = d.data;
            document.getElementById('problema').value = d.problema;
            document.getElementById('urgencia').value = d.urgencia;
            editando = true;
            fechar();
        }

        function excluir() {
            if(confirm("Excluir permanentemente?")) {
                dados.splice(atual, 1);
                localStorage.setItem('dados', JSON.stringify(dados));
                fechar();
                render();
            }
        }

        function limparCampos() {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function fechar() { document.getElementById('modal').style.display = 'none'; }

        render();
    </script>
</body>
</html>
