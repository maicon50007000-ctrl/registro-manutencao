<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sistema de Manutenção</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body id="admin-body" style="display: none;"> <div class="container">
        <div class="left">
            <h2>Registrar Manutenção</h2>
            <input id="componente" placeholder="Componente">
            <select id="bancada">
                <option>B01</option><option>B02</option><option>B03</option>
                <option>B04</option><option>B05</option>
            </select>
            <select id="restaurado">
                <option value="nao">Não restaurado</option>
                <option value="sim">✔ Restaurado</option>
            </select>
            <input type="date" id="data">
            <textarea id="problema" placeholder="Problema"></textarea>
            <select id="urgencia">
                <option value="Baixa">Baixa</option>
                <option value="Média">Média</option>
                <option value="Alta">Alta</option>
            </select>
            <button onclick="salvar()">Enviar</button>
            <br><br>
            <button onclick="logout()" style="background:#475569">Sair do Admin</button>
        </div>
        <div class="right" id="lista"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="mComp"></h3>
            <p id="mDados"></p>
            <button onclick="editar()">Salvar edição</button>
            <button onclick="excluir()">Excluir</button>
            <button onclick="fechar()">Fechar</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Simple Password Gate
        const senhaDefinida = "1234"; // Defina sua senha aqui
        if (sessionStorage.getItem('autenticado') !== 'true') {
            let tentativa = prompt("Digite a senha de administrador:");
            if (tentativa === senhaDefinida) {
                sessionStorage.setItem('autenticado', 'true');
                document.getElementById('admin-body').style.display = 'block';
            } else {
                alert("Acesso negado.");
                window.location.href = "index.html";
            }
        } else {
            document.getElementById('admin-body').style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem('autenticado');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
