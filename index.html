<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sistema de Manutenção</title>
		<style>
			body { 
				margin:0;
				font-family:Arial; 
				background:#0f172a; 
				color:white; 
			}
			.container { 
				display:flex;
				height:100vh; }
			.left { 
				width:35%; 
				padding:20px;
				background:#1e293b; }
			.right {
				flex:1;
				padding:20px;
				overflow:auto;
			}
			input, textarea, select { 
				width:100%; 
				margin:5px 0 10px; 
				padding:8px; 
				border-radius:5px;
				border:none; 
			}
			button { 
				padding:10px; 
				background:#06b6d4; 
				border:none;
				color:white; 
				cursor:pointer; 
				border-radius:5px;
			}
			.card { 
				background:#1e293b; 
				padding:10px;
				margin-bottom:10px; 
				border-radius:8px; 
				cursor:pointer; 
				display:flex; 
				justify-content:space-between; 
			}
			/* CORES */ 
			.urgencia-Alta { 
				color:#ef4444;
			} 
			.urgencia-Média { 
				color:#facc15;
			} 
			.urgencia-Baixa {
				color:#22c55e;
			}
			.restaurado { 
				color:#3b82f6;
			}

			.modal {
				position:fixed;
				top:0;
				left:0;
				width:100%; 
				height:100%;
				background:rgba(0,0,0,0.7);
				display:none;
				justify-content:center;
				align-items:center;
			}
			.modal-content { 
				background:#1e293b; 
				padding:20px;
				border-radius:10px;
				width:300px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="left">
				<h2>Registrar Manutenção</h2>
				<input id="componente" placeholder="Componente">
				<select id="bancada">
				<option>B01</option>
				<option>B02</option>
				<option>B03</option>
				<option>B04</option>
				<option>B05</option>
				</select>
				<select id="restaurado">
				<option value="nao">Não restaurado</option>
				<option value="sim">✔ Restaurado</option>
				</select>
				<input type="date" id="data">
				<textarea id="problema" placeholder="Problema"></textarea>
				<select id="urgencia">
				<option value="Baixa">Baixa</option>
				<option value="Média">Média</option>
				<option value="Alta">Alta</option>
				</select>
				<button onclick="salvar()">Enviar</button>
			</div>
			<div class="right" id="lista">
			</div>
		</div>
		<div class="modal" id="modal">
			<div class="modal-content">
				<h3 id="mComp"></h3>
				<p id="mDados"></p>
				<button onclick="editar()">Salvar edição</button>
				<button onclick="excluir()">Excluir</button>
				<button onclick="fechar()">Fechar</button>
			</div>
		</div>
		<script src="script-cliente.js"></script>
	</body>
</html>
