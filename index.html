<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Manutenção</title>
    <style>
        /* Shared CSS from your original file */
        body { margin:0; font-family:Arial; background:#0f172a; color:white; }
        .container { display:flex; height:100vh; }
        .right { flex:1; padding:20px; overflow:auto; }
        .card { background:#1e293b; padding:10px; margin-bottom:10px; border-radius:8px; cursor:pointer; display:flex; justify-content:space-between; }
        .urgencia-Alta { color:#ef4444; } 
        .urgencia-Média { color:#facc15; } 
        .urgencia-Baixa { color:#22c55e; }
        .restaurado { color:#3b82f6; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }
        .modal-content { background:#1e293b; padding:20px; border-radius:10px; width:300px; }
        button { padding:10px; background:#06b6d4; border:none; color:white; cursor:pointer; border-radius:5px; width: 100%; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: auto; background: #475569; opacity: 0.5; }
        .admin-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="right">
            <h2>Status de Manutenção</h2>
            <div id="lista"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="mComp"></h3>
            <p id="mDados"></p>
            <button onclick="fechar()">Fechar</button>
        </div>
    </div>

    <button class="admin-btn" onclick="location.href='admin.html'">Acesso Restrito</button>

    <script>
        let dados = JSON.parse(localStorage.getItem('dados')) || [];

        function render() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            dados.forEach((d, i) => {
                const div = document.createElement('div');
                let classe = 'card urgencia-' + d.urgencia;
                if (d.restaurado === 'sim') classe = 'card restaurado';
                div.className = classe;
                let label = d.restaurado === 'sim' ? '✔ Restaurado' : d.urgencia;
                div.innerHTML = `${d.componente} <span>${label}</span>`;
                div.onclick = () => abrir(i);
                lista.appendChild(div);
            });
        }

        function abrir(i) {
            const d = dados[i];
            document.getElementById('mComp').innerText = d.componente;
            document.getElementById('mDados').innerText = `Bancada: ${d.bancada}\n${d.restaurado === 'sim' ? 'Status: Restaurado\n' : ''}Data: ${d.data}\nProblema: ${d.problema}\nUrgência: ${d.urgencia}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function fechar() { document.getElementById('modal').style.display = 'none'; }

        // Sync data if changed in admin tab
        window.addEventListener('storage', () => {
            dados = JSON.parse(localStorage.getItem('dados')) || [];
            render();
        });

        render();
    </script>
    <!-- Add this before your script -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<script>
	    // Replace with your project details from Supabase settings
	    const SUPABASE_URL = 'https://your-project-id.supabase.co';
	    const SUPABASE_KEY = 'your-anon-public-key';
	    const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

	    async function render() {
		// Fetch from cloud instead of localStorage
		const { data: dados, error } = await supabase
		    .from('manutencao')
		    .select('*')
		    .order('created_at', { ascending: false });

		if (error) return console.error(error);

		const lista = document.getElementById('lista');
		lista.innerHTML = '<h2>Status de Manutenção</h2>';

		dados.forEach((d) => {
		    const div = document.createElement('div');
		    div.className = d.restaurado === 'sim' ? 'card restaurado' : 'card urgencia-' + d.urgencia;
		    div.innerHTML = `${d.componente} <span>${d.restaurado === 'sim' ? '✔' : d.urgencia}</span>`;
		    div.onclick = () => abrir(d);
		    lista.appendChild(div);
		});
	    }
	    render();
	</script>
</body>
</html>
